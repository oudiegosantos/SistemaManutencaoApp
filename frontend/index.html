<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Metalurgica Montenegro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Metalurgica Montenegro</h1>

    <h2>Cadastrar Cliente</h2>
    <input type="text" name="nome" id="nome" placeholder="Digite o nome do Cliente" />
    <input type="text" name="telefone" id="telefone" placeholder="Digite o contato do Cliente" />
    <input type="text" name="endereco" id="endereco" placeholder="Digite o endereço do Cliente" />
    <button onclick="cadastrarCliente()">Cadastrar</button>

    <h2>Lista de Clientes</h2>
    <button onclick="listarClientes()">Atualizar Lista</button>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Endereço</th>
            </tr>
        </thead>
        <tbody id="tabelaClientes"></tbody>
    </table>

<script src="app.js"></script>
</body>

</html>
